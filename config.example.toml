# Agora server configuration

[server]
# Address and port to listen on
bind = "127.0.0.1:8008"
# Server name (used in Matrix user/room IDs, e.g. @alice:localhost)
server_name = "localhost"

[database]
# "sqlite" or "postgres"
backend = "sqlite"
# SQLite path (relative to working directory) or PostgreSQL connection URI
uri = "agora.db"

[media]
# Directory for uploaded file storage (relative to working directory)
store_path = "media_store"
# Maximum upload size in bytes (50 MiB)
max_upload_bytes = 52428800
